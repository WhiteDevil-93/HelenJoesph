<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d3b3b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="ICU & ED Clinical Reference - interactive calculators, dosing, protocols">
<title>Titrate</title>
<link rel="manifest" href="manifest.json?v=45">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d3b3b'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='48' font-family='Arial' font-weight='bold' fill='%23ffffff'%3ET%3C/text%3E%3C/svg%3E">
<style>
:root{--p:#0f2e2e;--p2:#0d3b3b;--a:#00d9b5;--d:#e74c3c;--g:#00d9b5;--bg:#0f2e2e;--card:#0d3b3b;--b:#1a5c5c;--t:#ffffff;--t2:#a0c4c4;--w:#e74c3c;--i:#f39c12}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;line-height:1.5}
.hdr{position:sticky;top:0;z-index:100;background:var(--p);border-bottom:1px solid var(--b);padding:.5rem .75rem;display:flex;flex-direction:column;gap:.4rem;backdrop-filter:blur(10px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.logo{font-size:1.15rem;font-weight:800;color:var(--a);letter-spacing:-.5px;white-space:nowrap}
.s-wrap{flex:1;position:relative;min-width:0}
.s-wrap input{width:100%;padding:.4rem .8rem .4rem 2rem;border-radius:.6rem;border:1.5px solid var(--b);background:var(--card);color:var(--t);font-size:.82rem;outline:none;transition:border .2s}
.s-wrap input:focus{border-color:var(--a)}
.s-wrap::before{content:'🔍';position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:.75rem;opacity:.5}
.w-inp{width:4.5rem;padding:.4rem .5rem;border-radius:.6rem;border:1.5px solid var(--b);background:var(--card);color:var(--t);font-size:.82rem;text-align:center;outline:none}
.w-inp:focus{border-color:var(--a)}
.w-lbl{font-size:.65rem;color:var(--t2);margin-left:.2rem}
.nav{display:flex;gap:.25rem;padding:.15rem .5rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:sticky;top:calc(48px + env(safe-area-inset-top,0px));z-index:99;background:var(--p);border-bottom:1px solid var(--b)}
.nav::-webkit-scrollbar{display:none}
.cp{white-space:nowrap;padding:.3rem .55rem;border-radius:.5rem;border:none;background:transparent;color:var(--t2);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0}
.cp.on{background:var(--a);color:var(--p)}
.n{display:inline-flex;align-items:center;justify-content:center;background:var(--d);color:#fff;font-size:.6rem;width:1.1rem;height:1.1rem;border-radius:50%;margin-left:.2rem;font-weight:700}
.cont{padding:.5rem .75rem 4rem;max-width:900px;margin:0 auto;min-height:calc(100vh - 120px)}
.sect{background:var(--card);border-radius:.7rem;margin-bottom:.5rem;border:1px solid var(--b);overflow:hidden}
.sh{padding:.6rem .75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--p2);transition:background .15s}
.sh:hover{background:rgba(255,255,255,.03)}
.sht{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.shi{font-size:1.1rem}
.shc{font-size:.7rem;color:var(--t2);transition:transform .2s}
.sect.open .shc{transform:rotate(180deg)}
.sb{display:none;padding:.4rem .5rem}
.sect.open .sb{display:block}
.drug{background:rgba(0,0,0,.12);border-radius:.5rem;padding:.5rem .6rem;margin-bottom:.35rem;border-left:3px solid var(--a);transition:background .15s;cursor:pointer}
.drug:hover{background:rgba(255,255,255,.04)}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem}
.dn{font-size:.82rem;font-weight:700}
.dg{font-size:.78rem;color:var(--a);margin:.1rem 0}
.pg{font-size:.78rem;color:var(--t2)}
.rt{font-size:.72rem;color:var(--i);display:inline-block;padding:.1rem .3rem;background:rgba(243,156,18,.1);border-radius:.3rem;margin:.1rem .2rem 0 0}
.note{font-size:.78rem;color:var(--t2);line-height:1.5;margin:.2rem 0;padding:.25rem .35rem;background:rgba(255,255,255,.03);border-radius:.3rem}
.star{background:none;border:none;color:var(--t2);font-size:1.05rem;cursor:pointer;padding:.1rem .2rem;transition:color .15s;line-height:1}
.star.on{color:var(--a)}
.nores{text-align:center;padding:2rem;color:var(--t2);font-size:.85rem}
.wtag{display:inline-block;background:rgba(0,217,181,.12);color:var(--a);padding:.15rem .35rem;border-radius:.3rem;font-size:.75rem;font-weight:600;margin-left:.3rem}
.inst{position:fixed;bottom:1rem;right:1rem;background:var(--a);color:var(--p);padding:.5rem .8rem;border-radius:.6rem;font-size:.8rem;font-weight:700;cursor:pointer;border:none;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.3);display:none}
.inst.on{display:block}
.top{position:fixed;bottom:4rem;right:1rem;width:2.5rem;height:2.5rem;border-radius:50%;background:var(--card);border:1.5px solid var(--b);color:var(--a);display:none;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;z-index:199;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.top.on{display:flex}
.inf-calc{background:rgba(0,0,0,.15);border-radius:.4rem;padding:.4rem;margin:.3rem 0;font-size:.78rem}
.inf-title{font-weight:700;color:var(--a);margin-bottom:.2rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
.inf-row{display:flex;gap:.3rem;margin-bottom:.2rem}
.inf-fld{flex:1}
.inf-fld label{display:block;font-size:.68rem;color:var(--t2);margin-bottom:.1rem}
.inf-fld input{width:100%;padding:.25rem .4rem;border-radius:.3rem;border:1px solid var(--b);background:var(--card);color:var(--t);font-size:.75rem;outline:none}
.inf-btn{background:var(--a);color:var(--p);border:none;padding:.3rem .6rem;border-radius:.3rem;font-size:.72rem;font-weight:700;cursor:pointer;margin-top:.2rem}
.inf-res{font-size:.85rem;font-weight:700;color:var(--a);margin-top:.2rem;min-height:1.2rem}
.step-card{display:flex;gap:.4rem;margin:.25rem 0;padding:.4rem .5rem;background:rgba(0,0,0,.15);border-radius:.4rem;border-left:2px solid var(--a)}
.step-num{font-weight:800;color:var(--a);font-size:.9rem;flex-shrink:0;min-width:1.5rem}
.step-body{flex:1}
.step-action{font-weight:700;font-size:.78rem;color:var(--t);margin-bottom:.1rem}
.step-details{font-size:.75rem;color:var(--t2);margin-top:.1rem}
.step-caution{font-size:.72rem;color:var(--d);margin-top:.15rem}
.drug-card{background:rgba(0,0,0,.12);border-radius:.5rem;padding:.5rem .6rem;margin:.25rem 0;border-left:3px solid var(--a)}
.drug-name{font-weight:700;font-size:.82rem}
.drug-dose{font-size:.78rem;color:var(--a);margin:.1rem 0}
.drug-paed{font-size:.78rem;color:var(--t2)}
.drug-route{font-size:.72rem;color:var(--i);display:inline-block;padding:.1rem .3rem;background:rgba(243,156,18,.1);border-radius:.3rem;margin:.1rem .2rem 0 0}
.drug-notes{font-size:.76rem;color:var(--t2);margin-top:.2rem}
.caution-tag{display:inline-block;background:rgba(231,76,60,.12);color:var(--d);padding:.1rem .3rem;border-radius:.3rem;font-size:.7rem;margin:.1rem .1rem 0 0}
.prot-sec{margin:.3rem 0;padding:.4rem .5rem;background:rgba(255,255,255,.03);border-radius:.4rem}
.prot-sec-title{font-size:.72rem;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.15rem}
.prot-sec-body{font-size:.78rem;color:var(--t2);line-height:1.5}
.calc-card{background:var(--card);border:1px solid var(--b);border-radius:.6rem;padding:.75rem;margin-bottom:.5rem}
.calc-cat{font-size:.72rem;color:var(--t2);margin-bottom:.4rem}
.calc-comp{margin:.4rem 0}
.calc-comp-label{font-size:.78rem;font-weight:700;margin-bottom:.2rem;color:var(--t)}
.calc-seg{display:flex;flex-wrap:wrap;gap:.25rem}
.seg-btn{background:rgba(0,0,0,.2);border:1.5px solid var(--b);border-radius:.4rem;padding:.35rem .5rem;color:var(--t);font-size:.75rem;cursor:pointer;transition:all .15s;flex:1;min-width:60px;text-align:center}
.seg-btn:hover{border-color:var(--a)}
.seg-btn.sel{background:var(--a);color:var(--p);border-color:var(--a);font-weight:700}
.seg-btn small{display:block;font-size:.65rem;color:var(--t2);margin-top:.1rem;font-weight:400}
.seg-btn.sel small{color:var(--p)}
.calc-yn{margin:.3rem 0;display:flex;align-items:center;justify-content:space-between;padding:.35rem .5rem;background:rgba(0,0,0,.1);border-radius:.4rem}
.calc-yn-label{font-size:.78rem;flex:1}
.calc-yn-btns{display:flex;gap:.3rem}
.yn-btn{padding:.3rem .6rem;border-radius:.3rem;border:1.5px solid var(--b);background:var(--card);color:var(--t2);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s}
.yn-btn:hover{border-color:var(--a)}
.yn-btn.sel.yes{background:rgba(231,76,60,.15);color:var(--d);border-color:var(--d)}
.yn-btn.sel.no{background:rgba(46,204,113,.15);color:#2ecc71;border-color:#2ecc71}
.calc-pt{margin:.2rem 0}
.pt-lbl{display:flex;align-items:center;gap:.4rem;font-size:.78rem;cursor:pointer;padding:.2rem .3rem;border-radius:.3rem;transition:background .1s}
.pt-lbl:hover{background:rgba(255,255,255,.05)}
.pt-lbl input[type=checkbox]{width:1.1rem;height:1.1rem;accent-color:var(--a)}
.calc-result{margin-top:.5rem;padding:.5rem .6rem;background:rgba(0,0,0,.15);border-radius:.5rem;text-align:center;border-left:3px solid var(--a)}
.res-score{font-size:1.8rem;font-weight:800;color:var(--a);margin-bottom:.2rem}
.res-action{font-size:.78rem;color:var(--t);line-height:1.4;padding:.3rem .4rem;background:rgba(255,255,255,.05);border-radius:.3rem;margin-top:.2rem}
.calc-inputs{display:flex;gap:.4rem;flex-wrap:wrap;margin:.3rem 0}
.calc-inp{flex:1;min-width:100px}
.calc-inp label{display:block;font-size:.72rem;color:var(--t2);margin-bottom:.1rem}
.calc-inp input{width:100%;padding:.3rem .4rem;border-radius:.3rem;border:1px solid var(--b);background:var(--card);color:var(--t);font-size:.78rem;outline:none}
.calc-formula{font-size:.85rem;color:var(--a);font-weight:700;margin:.3rem 0;padding:.3rem .5rem;background:rgba(0,217,181,.08);border-radius:.3rem;font-family:monospace}
.search-count{text-align:center;font-size:.8rem;color:var(--t2);padding:1rem 0}
.badge{display:inline-block;background:var(--a);color:var(--p);padding:.15rem .35rem;border-radius:.3rem;font-size:.68rem;font-weight:700;margin:.15rem .2rem 0 0}
.dxc-row,.cls-row,.mon-row,.disp-row,.cf-sub,.set-row{display:flex;justify-content:space-between;padding:.15rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.78rem}
.dxc-label,.cls-label,.mon-label,.disp-label,.set-param{font-weight:600;color:var(--t)}
.dxc-val,.cls-val,.mon-val,.disp-val,.set-val{color:var(--t2)}
.cf-sys{margin:.2rem 0}
.cf-sys-title{font-size:.75rem;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.1rem}
.cf-item{font-size:.76rem;color:var(--t2);padding:.1rem 0;padding-left:.5rem;border-left:2px solid var(--b);margin:.1rem 0}
.eq-list{display:flex;flex-wrap:wrap;gap:.3rem;margin:.3rem 0}
.eq-tag{background:var(--p2);color:var(--t);padding:.25rem .5rem;border-radius:.3rem;font-size:.72rem;border:1px solid var(--b)}
.set-unit,.set-cond,.mon-freq{font-size:.7rem;color:var(--t2);margin-left:.3rem}
.formula-card{background:rgba(0,0,0,.1);padding:.4rem .5rem;border-radius:.4rem;margin:.2rem 0}
.formula-name{font-weight:700;font-size:.78rem;color:var(--a)}
.formula-expr{font-family:monospace;font-size:.75rem;color:var(--t2);margin:.1rem 0}
.formula-int{font-size:.72rem;color:var(--t2)}
.warn-item{color:var(--d);font-size:.75rem;padding:.1rem 0}
.comp-row{font-size:.75rem;color:var(--t2);padding:.1rem 0}
.drug-cautions,.drug-contra{margin:.1rem 0}
.contra-tag{display:inline-block;background:rgba(231,76,60,.1);color:var(--d);padding:.1rem .3rem;border-radius:.3rem;font-size:.7rem;margin:.1rem .1rem 0 0}
.compact-input{width:100%;padding:.25rem .4rem;border-radius:.3rem;border:1px solid var(--b);background:var(--card);color:var(--t);font-size:.75rem;outline:none;margin:.1rem 0}
.compact-input:focus{border-color:var(--a)}

/* ===== STAGE 2: RICH SUB-STRUCTURE RENDERERS ===== */
/* GCS Table */
.gcs-table{background:var(--card);border:1px solid var(--b);border-radius:.5rem;padding:.4rem;margin:.3rem 0}
.gcs-row{display:flex;gap:.2rem;margin:.1rem 0}
.gcs-score-item{background:rgba(0,0,0,.15);border-radius:.3rem;cursor:pointer;transition:all .15s;font-size:.78rem;padding:.3rem .4rem;flex:1;text-align:center;border:1.5px solid transparent}
.gcs-score-item:hover{background:rgba(0,217,181,.1);border-color:var(--a)}
.gcs-score-item.picked{background:var(--a);color:var(--p);font-weight:700;border-color:var(--a)}
.gcs-total{font-size:1.2rem;font-weight:800;color:var(--a);text-align:center;margin-top:.3rem;padding:.2rem;background:rgba(0,217,181,.08);border-radius:.3rem}

/* Burn Classification */
.burn-table{width:100%;border-collapse:collapse;font-size:.72rem;margin:.3rem 0}
.burn-table th{background:var(--p2);color:var(--a);padding:.3rem .4rem;text-align:left;font-size:.65rem;text-transform:uppercase}
.burn-table td{padding:.3rem .4rem;border-bottom:1px solid var(--b)}
.burn-degree{font-weight:700;color:var(--a)}
.burn-sev-minor{background:rgba(46,204,113,.1);color:#2ecc71;padding:.2rem .4rem;border-radius:.3rem;font-size:.7rem;font-weight:700}
.burn-sev-moderate{background:rgba(241,196,15,.1);color:#f1c40f;padding:.2rem .4rem;border-radius:.3rem;font-size:.7rem;font-weight:700}
.burn-sev-major{background:rgba(231,76,60,.1);color:#e74c3c;padding:.2rem .4rem;border-radius:.3rem;font-size:.7rem;font-weight:700}

/* NEXUS Criteria */
.nexus-crit{display:flex;align-items:center;justify-content:space-between;padding:.35rem .5rem;background:rgba(0,0,0,.1);border-radius:.4rem;margin:.2rem 0;font-size:.78rem}
.nexus-btns{display:flex;gap:.2rem}
.nexus-btn{padding:.25rem .5rem;border-radius:.3rem;border:1.5px solid var(--b);background:var(--card);color:var(--t2);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s}
.nexus-btn:hover{border-color:var(--a)}
.nexus-btn.yes{background:rgba(231,76,60,.15);color:#e74c3c;border-color:#e74c3c}
.nexus-btn.no{background:rgba(46,204,113,.15);color:#2ecc71;border-color:#2ecc71}
.nexus-res{font-weight:700;text-align:center;padding:.4rem;border-radius:.4rem;margin-top:.3rem;font-size:.8rem}
.nexus-res.low{background:rgba(46,204,113,.12);color:#2ecc71}
.nexus-res.high{background:rgba(231,76,60,.12);color:#e74c3c}

/* Equipment & Checklist */
.eq-grid{display:flex;flex-wrap:wrap;gap:.3rem;margin:.3rem 0}
.eq-item{background:var(--p2);color:var(--t);padding:.25rem .5rem;border-radius:.3rem;font-size:.72rem;border:1px solid var(--b)}
.chk-list{margin:.3rem 0}
.chk-item{display:flex;align-items:center;gap:.4rem;padding:.25rem .4rem;font-size:.78rem;cursor:pointer;transition:all .15s;border-radius:.3rem}
.chk-item:hover{background:rgba(0,0,0,.1)}
.chk-item.checked{text-decoration:line-through;opacity:.5}
.chk-box{width:1rem;height:1rem;border:2px solid var(--b);border-radius:.25rem;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.chk-item.checked .chk-box{background:var(--a);border-color:var(--a);color:var(--p)}

/* H's and T's */
.hs-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin:.3rem 0}
.h-item{background:rgba(52,152,219,.1);border-left:3px solid var(--i);padding:.4rem;border-radius:.3rem;font-size:.75rem}
.t-item{background:rgba(231,76,60,.1);border-left:3px solid var(--d);padding:.4rem;border-radius:.3rem;font-size:.75rem}
.hs-label{font-weight:700;font-size:.65rem;text-transform:uppercase;margin-bottom:.15rem}

/* ===== STAGE 3: CALCULATOR RESULT STYLES ===== */
.res-score{font-size:1.6rem;font-weight:700;color:var(--a);margin:.2rem 0}
.res-action{font-size:.75rem;padding:.35rem .5rem;border-radius:.35rem;margin-top:.25rem;line-height:1.4;background:rgba(0,0,0,.15);border-left:3px solid var(--a)}
.res-action.normal{background:rgba(46,204,113,.12);border-left-color:#2ecc71;color:#2ecc71}
.res-action.low{background:rgba(241,196,15,.12);border-left-color:#f39c12;color:#f39c12}
.res-action.mild{background:rgba(241,196,15,.15);border-left-color:#f1c40f;color:#f1c40f}
.res-action.high{background:rgba(231,76,60,.15);border-left-color:#e74c3c;color:#e74c3c}
.res-action.severe{background:rgba(192,57,43,.15);border-left-color:#c0392b;color:#c0392b}
.res-action.critical{background:rgba(142,68,173,.15);border-left-color:#8e44ad;color:#8e44ad}

/* ===== LIGHT THEME ===== */
body.light{--p:#f3f7f6;--p2:#eef4f3;--a:#0d8a6f;--d:#c0392b;--bg:#f3f7f6;--card:#ffffff;--b:#d0e0dc;--t:#0f2e2e;--t2:#5a7a76}
body.light .hdr{background:var(--card);border-bottom-color:var(--b)}
body.light .nav{background:var(--card);border-bottom-color:var(--b)}
body.light .sect{background:var(--card);border-color:var(--b)}
body.light .drug,body.light .drug-card{background:rgba(0,0,0,.04);border-left-color:var(--a)}
body.light .step-card{background:rgba(0,0,0,.04);border-left-color:var(--a)}
body.light .note{background:rgba(0,0,0,.03)}
body.light .s-wrap input,body.light .w-inp{background:#fff;border-color:var(--b);color:var(--t)}
body.light .cp.on{background:var(--a);color:#fff}
body.light .calc-card{background:var(--card);border-color:var(--b)}
body.light .seg-btn{background:rgba(0,0,0,.06);border-color:var(--b);color:var(--t)}
body.light .seg-btn.sel{background:var(--a);color:#fff}
body.light .calc-result{background:rgba(0,0,0,.06)}
body.light .calc-yn{background:rgba(0,0,0,.04)}
body.light .prot-sec{background:rgba(0,0,0,.02)}
body.light .wtag{background:rgba(13,138,111,.1)}
body.light .inf-calc{background:rgba(0,0,0,.06)}
body.light .inf-fld input,body.light .calc-inp input,body.light .compact-input{background:#fff;border-color:var(--b);color:var(--t)}
body.light .eq-tag{background:var(--p2);border-color:var(--b)}
body.light .gcs-score-item{background:rgba(0,0,0,.06)}
body.light .gcs-score-item.picked{color:#fff}
body.light .gcs-total{background:rgba(13,138,111,.1)}
body.light .nexus-btn{background:var(--card);border-color:var(--b);color:var(--t2)}

/* Animations */
@keyframes in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sect{animation:in .2s ease-out}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-row">
<div class="logo">Titrate</div>
<div class="s-wrap"><input id="s" placeholder="Search..." autocomplete="off"></div>
<input class="w-inp" id="w" type="number" placeholder="wt"><span class="w-lbl">kg</span>
<button class="cp" style="padding:.3rem .5rem" id="theme-tog" onclick="togTheme()">🌙</button>
</div>
<nav class="nav" id="nav"></nav>
</header>
<main class="cont" id="c"></main>
<button class="inst" id="inst" onclick="doInstall()">📲 Install</button>
<button class="top" id="top" onclick="scrollToTop()">⬆</button>
<script src="app-4.4.js?v=45"></script>
</body>
</html>
