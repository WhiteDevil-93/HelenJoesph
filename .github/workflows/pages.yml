name: Build Check
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Verify build
        run: |
          echo "Files in repo:"
          ls -la
          echo "index.html size: $(wc -c < index.html)"
          echo "app.js size: $(wc -c < app.js)"
          echo "data.json size: $(wc -c < data.json)"
